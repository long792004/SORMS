services:
  - type: web
    name: sorms-api
    env: docker
    plan: free
    rootDir: .
    dockerContext: .
    dockerfilePath: ./Dockerfile

    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT

      - key: ConnectionStrings__DefaultConnection
        sync: false

      - key: Jwt__Key
        sync: false

      - key: Jwt__Issuer
        value: SORMS

      - key: Jwt__Audience
        value: SORMSUsers

      - key: AdminAccount__Username
        value: admin

      - key: AdminAccount__Email
        sync: false

      - key: AdminAccount__Password
        sync: false

      - key: AdminAccount__FullName
        value: System Administrator

      - key: PayOS__ClientId
        sync: false

      - key: PayOS__ApiKey
        sync: false

      - key: PayOS__ChecksumKey
        sync: false

      - key: PayOS__BaseUrl
        value: https://api-merchant.payos.vn

      - key: PayOS__WebhookUrl
        sync: false

      - key: PublicApiUrl
        sync: false